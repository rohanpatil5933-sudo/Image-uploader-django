{% extends "base.html" %}

{% block title %}Image Upload Page{% endblock %}

{% block content %}
<style>
    body {
        /* background: url('https://images.unsplash.com/photo-1503264116251-35a269479413?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
        background-size: cover; */
        background: linear-gradient(135deg, #e0f7fa, #c8e6c9);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
    }

    .form-container {
        /* background: rgba(15, 15, 15, 0.1); */
        background: whitesmoke;
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 40px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        max-width: 600px;
        margin: 40px auto;
        color: #fff;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: black;
        font-size: 28px;
    }

    .form-container form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .form-container input[type="file"] {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        padding: 10px;
        border-radius: 10px;
        color: white;
    }

    .form-container button {
        background-color: blue;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease-in-out;
    }

    .form-container button:hover {
        background-color: green;
    }

    .images-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        padding: 0 40px 40px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .image-item {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 15px;
        overflow: hidden;
        padding: 20px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        text-align: center;
    }

    .image-item img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    .image-item p {
        margin-bottom: 10px;
    }

    .delete-button {
        background-color: #ff4b5c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease-in-out;
    }

    .delete-button:hover {
        background-color: #e63e50;
    }
</style>

<div class="form-container">
    <h2>Upload New Image</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload Image</button>
    </form>
</div>

<div class="images-container">
    {% for x in img %}
        <div class="image-item">
            <img src="{{ x.photo.url }}" alt="Uploaded Image">
            <p>Uploaded on: {{ x.date|date:"l, F d, Y h:i A" }}</p>
            <form action="{% url 'delete_image' x.id %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="delete-button">Delete</button>
            </form>
        </div>
    {% endfor %}
</div>
{% endblock %}
